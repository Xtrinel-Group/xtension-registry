name: Publish Registry

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build registry.json
        id: build
        run: |
          node -e "
          const fs = require('fs');
          const path = require('path');

          const official = [];
          const community = [];

          const officialDir = 'registry/official';
          const communityDir = 'registry/community';

          if (fs.existsSync(officialDir)) {
            fs.readdirSync(officialDir)
              .filter(f => f.endsWith('.json'))
              .forEach(f => {
                const data = JSON.parse(fs.readFileSync(path.join(officialDir, f)));
                official.push(data);
              });
          }

          if (fs.existsSync(communityDir)) {
            fs.readdirSync(communityDir)
              .filter(f => f.endsWith('.json') && f !== '.gitkeep')
              .forEach(f => {
                const data = JSON.parse(fs.readFileSync(path.join(communityDir, f)));
                community.push(data);
              });
          }

          const registry = { official, community, updatedAt: new Date().toISOString() };
          fs.writeFileSync('registry.json', JSON.stringify(registry, null, 2));
          console.log('Built registry.json with', official.length, 'official and', community.length, 'community xtensions');
          "

      - name: Upload to R2
        env:
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: |
          curl -fsSL https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip -o awscliv2.zip
          unzip -q awscliv2.zip
          sudo ./aws/install --update

          AWS_ACCESS_KEY_ID=$R2_ACCESS_KEY_ID \
          AWS_SECRET_ACCESS_KEY=$R2_SECRET_ACCESS_KEY \
          aws s3 cp registry.json s3://$R2_BUCKET/registry/registry.json \
            --endpoint-url https://$R2_ACCOUNT_ID.r2.cloudflarestorage.com \
            --content-type application/json \
            --cache-control "public, max-age=60"

          echo "Published registry.json to R2"
